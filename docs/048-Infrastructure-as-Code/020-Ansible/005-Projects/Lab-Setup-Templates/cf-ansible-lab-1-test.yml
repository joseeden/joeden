# Maintainer: 
# Jose Eden - eden.noel@yahoo.com
#----------------------------------------------------------------
# Templcf-ate: cf-ansible-lab-1
# Description: This template sets up 4 instances with elastic IPs.
#----------------------------------------------------------------
Parameters:
  NameOfService:
    Description: The tag name associated with this EC2 instances.
    Type: String
  KeyName:
    Description: Name of an existing EC2 KeyPair to enable SSH access into the server
    Type: AWS::EC2::KeyPair::KeyName

Mappings:
  RegionMap:
    ap-southeast-1:
      Description: Red Hat Enterprise Linux version 8 (HVM)
      AMI: ami-0d6ba217f554f6137 
  Hostnames:
    controller:
      Name: cfans-tstcontroller-1
    test1:
      Name: cfans-tstsvr2
    test2:
      Name: cfans-tstsvr3
    test3:
      Name: cfans-tstsvr4
    test4:
      Name: cfans-lb1

Resources:

  LnEc2Instancetestserver1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId:
        Fn::FindInMap:
        - RegionMap
        - !Ref AWS::Region
        - AMI
      SecurityGroups:
        - !Ref LnSecurityGroup
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstcontroller' ,'1'] ]
        - Key: Lab
          Value: cf-ansible-lab-1
      UserData:
        Fn::Base64:
          !Sub |
          #cloud-config
          system_info:
              default_user:
                  name: eden

          runcmd:
          - !FindInMap [Hostnames, !Ref controller]] > $VAR
          - sudo hostnamectl set-hostname $VAR
          - echo "PS1=\"\u@\H:\W $ \"" >> .bashrc  

  LnEc2Instancetestserver2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId:
        Fn::FindInMap:
        - RegionMap
        - !Ref AWS::Region
        - AMI
      SecurityGroups:
        - !Ref LnSecurityGroup
      KeyName: !Ref KeyName
      UserData:
        Fn::Base64:
          !Sub |
            #cloud-config
            system_info:
                default_user:
                    name: eden
            runcmd:
            echo "PS1=\"\u@\H:\W $ \"" >> .bashrc   
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr' ,'2'] ]
        - Key: Lab
          Value: cf-ansible-lab-1
      UserData:
        Fn::Base64:
          !Sub |
          #cloud-config
          system_info:
              default_user:
                  name: eden
          runcmd:
          - echo "PS1=\"\u@\H:\W $ \"" >> .bashrc        
          - sudo pip install --upgrade pip
          - sudo yum install -y vim bash-completion python3
          - sudo yum update -y

  LnEc2Instancetestserver3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId:
        Fn::FindInMap:
        - RegionMap
        - !Ref AWS::Region
        - AMI
      SecurityGroups:
        - !Ref LnSecurityGroup
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr' ,'3'] ]
        - Key: Lab
          Value: cf-ansible-lab-1 
      UserData:
        Fn::Base64:
          !Sub |
            #cloud-config
            system_info:
                default_user:
                    name: eden
            runcmd:
            - echo "PS1=\"\u@\H:\W $ \"" >> .bashrc                      
            - sudo pip install --upgrade pip
            - sudo yum install -y vim bash-completion python3
            - sudo yum update -y

  LnEc2Instancetestserver4:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId:
        Fn::FindInMap:
        - RegionMap
        - !Ref AWS::Region
        - AMI
      SecurityGroups:
        - !Ref LnSecurityGroup
      KeyName: !Ref KeyName
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr' ,'4'] ]
        - Key: Lab
          Value: cf-ansible-lab-1    
      UserData:
        Fn::Base64:
          !Sub |
            #cloud-config
            system_info:
                default_user:
                    name: eden
            runcmd:
            - echo "PS1=\"\u@\H:\W $ \"" >> .bashrc                          
            - sudo pip install --upgrade pip
            - sudo yum install -y vim bash-completion python3
            - sudo yum update -y

  LnEc2InstanceLoadBalancer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId:
        Fn::FindInMap:
        - RegionMap
        - !Ref AWS::Region
        - AMI
      SecurityGroups:
        - !Ref LnSecurityGroup
      KeyName: !Ref KeyName    
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'lb' ,'1'] ]
        - Key: Lab
          Value: cf-ansible-lab-1 
      UserData:
        Fn::Base64:
          !Sub |
            #cloud-config
            system_info:
                default_user:
                    name: eden
            runcmd:
            - echo "PS1=\"\u@\H:\W $ \"" >> .bashrc  
            - sudo pip install --upgrade pip
            - sudo yum install -y vim bash-completion python3
            - sudo yum update -y

  LnSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH to client host. Created using CloudFormation template.
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: tstlab-2-sg
        - Key: Description
          Value: Security Group created for SSH and HTTP access to instances.
        - Key: Lab
          Value: cf-ansible-lab-1          
  
  LnElasticIp1:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref LnEc2Instancetestserver1
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr-elip' ,'1'] ]
        - Key: Lab
          Value: cf-ansible-lab-1          

  LnElasticIp2:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref LnEc2Instancetestserver2
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr-elip' ,'2'] ]
        - Key: Lab
          Value: cf-ansible-lab-1     

  LnElasticIp3:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref LnEc2Instancetestserver3
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr-elip' ,'3'] ]
        - Key: Lab
          Value: cf-ansible-lab-1         

  LnElasticIp4:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref LnEc2Instancetestserver4
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'tstsvr-elip' ,'4'] ]
        - Key: Lab
          Value: cf-ansible-lab-1         

  LnElasticIp5:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref LnEc2InstanceLoadBalancer
      Tags:
        - Key: Name
          Value: !Join [ '-', [ !Ref NameOfService, 'lb-elip' ,'5'] ]
        - Key: Lab
          Value: cf-ansible-lab-1         

Outputs:

  LnPublicIpAddressInstance1:
    Description: The Public IP address for EC2 instances
    Value: !GetAtt
      - LnEc2Instancetestserver1
      - PublicIp

  LnPublicIpAddressInstance2:
    Description: The Public IP address for EC2 instances
    Value: !GetAtt
      - LnEc2Instancetestserver2
      - PublicIp

  LnPublicIpAddressInstance3:
    Description: The Public IP address for EC2 instances
    Value: !GetAtt
      - LnEc2Instancetestserver3
      - PublicIp

  LnPublicIpAddressInstance4:
    Description: The Public IP address for EC2 instances
    Value: !GetAtt
      - LnEc2Instancetestserver4
      - PublicIp

  LnPublicIpAddressLoadBalancer:
    Description: The Public IP address for EC2 instances
    Value: !GetAtt
      - LnEc2InstanceLoadBalancer
      - PublicIp

  WebsiteLink:
    Description: The Public DNS for the EC2 Instance
    Value: !Sub 'http://${LnEc2InstanceLoadBalancer.PublicDnsName}'