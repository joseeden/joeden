# deploy-web-app.yml
#-------------------------------------
---

- name: Install dependencies
  become: true
  hosts: db_web
  tasks:

  - name: Install pip
    yum:
      name: "python3-pip"
      state: present

  - name: Install all required dependencies
    yum:
      name: "{{ item }}"
      state: present
    with_items:
      - "https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm"

  - name: Install Python Flask + MySQL dependencies
    pip:
      name: "{{ item }}"
      state: present
    with_items:
      - "python3-pip"
      - "python-pip"
      - "python-devel" 
      - "python-setuptools"
      - "python-dev"
      - "build essential"
      - "flask"
      - "flask-mysql"
      - "PyMySQL"   
      - "MySQL-python"
      - "MySQLdb"

- name: Deploy a web application
  become: true
  hosts: db_web 
  tasks:

  - name: Install MySQL community repository
    yum:
      name: "http://repo.mysql.com/mysql-community-release-el7-5.noarch.rpm"
      state: present

  - name: Install MySQL database
    yum:
      name: "{{ item }}"
      state: present
    with_items:
      - "mysql-server"
      - "mysql-devel"

  - name: Create MySQL configuration file
    copy:
      content: |
        [client]
        user=root
        password="admin123"
      dest: "/etc/.my.cnf"

  - name: Start MySQL Service
    service:
      name: mysqld
      state: started
      enabled: yes

  - name: Create Application Database
    mysql_db:
      name: admin
      state: present

  - name: Create Database user
    mysql_user:
      name: admin
      password: admin123
      priv: '*.*:ALL'
      state: present

  - name: Copy source code
    copy:
      src: ../files/app.py
      dest: /opt/app.py

  - name: Start web server
    shell: FLASK_APP=/opt/app.py nohup flask run --host=0.0.0.0 &