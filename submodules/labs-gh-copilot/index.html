<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pennywise</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container py-4">
    <h1 class="mb-4">Pennywise</h1>
    <!-- Username Input and Submit Button -->
    <form id="username-form" class="mb-4" autocomplete="off" onsubmit="return false;">
      <div class="mb-2">
        <label for="username" class="form-label fw-bold">Username</label>
        <input type="text" class="form-control" id="username" name="username" minlength="5" required pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{5,}$" placeholder="Enter username">
        <div id="usernameHelp" class="form-text">
          Must be at least 5 characters, include 1 uppercase letter, 1 number, and 1 special character.
        </div>
        <div id="usernameError" class="text-danger small mt-1" style="display:none;"></div>
      </div>
      <button id="username-submit" class="btn btn-success" type="submit">Submit</button>
    </form>
    <!-- Tabs -->
    <ul class="nav nav-tabs" id="pennywiseTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="data-tab" data-bs-toggle="tab" data-bs-target="#data" type="button" role="tab" aria-controls="data" aria-selected="true">Data</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="chart-tab" data-bs-toggle="tab" data-bs-target="#chart" type="button" role="tab" aria-controls="chart" aria-selected="false">Chart</button>
      </li>
    </ul>
    <div class="tab-content" id="pennywiseTabsContent">
      <!-- Data Tab -->
      <div class="tab-pane fade show active pt-4" id="data" role="tabpanel" aria-labelledby="data-tab">
        <form id="data-form">
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead class="table-light">
                <tr>
                  <th>Month</th>
                  <th>Income ($)</th>
                  <th>Expense ($)</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>January</td>
                  <td><input type="number" class="form-control income-input" min="0" value="800" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="400" required></td>
                </tr>
                <tr>
                  <td>February</td>
                  <td><input type="number" class="form-control income-input" min="0" value="950" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="600" required></td>
                </tr>
                <tr>
                  <td>March</td>
                  <td><input type="number" class="form-control income-input" min="0" value="700" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="350" required></td>
                </tr>
                <tr>
                  <td>April</td>
                  <td><input type="number" class="form-control income-input" min="0" value="1000" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="800" required></td>
                </tr>
                <tr>
                  <td>May</td>
                  <td><input type="number" class="form-control income-input" min="0" value="850" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="500" required></td>
                </tr>
                <tr>
                  <td>June</td>
                  <td><input type="number" class="form-control income-input" min="0" value="900" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="700" required></td>
                </tr>
                <tr>
                  <td>July</td>
                  <td><input type="number" class="form-control income-input" min="0" value="600" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="300" required></td>
                </tr>
                <tr>
                  <td>August</td>
                  <td><input type="number" class="form-control income-input" min="0" value="750" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="450" required></td>
                </tr>
                <tr>
                  <td>September</td>
                  <td><input type="number" class="form-control income-input" min="0" value="500" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="200" required></td>
                </tr>
                <tr>
                  <td>October</td>
                  <td><input type="number" class="form-control income-input" min="0" value="950" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="650" required></td>
                </tr>
                <tr>
                  <td>November</td>
                  <td><input type="number" class="form-control income-input" min="0" value="850" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="550" required></td>
                </tr>
                <tr>
                  <td>December</td>
                  <td><input type="number" class="form-control income-input" min="0" value="650" required></td>
                  <td><input type="number" class="form-control expense-input" min="0" value="400" required></td>
                </tr>
              </tbody>
            </table>
          </div>
        </form>
      </div>
      <!-- Chart Tab -->
      <div class="tab-pane fade pt-4" id="chart" role="tabpanel" aria-labelledby="chart-tab">
        <div class="d-flex justify-content-end mb-3">
          <button id="download-chart" class="btn btn-primary" type="button">Download Chart</button>
        </div>
        <canvas id="incomeExpenseChart" height="100"></canvas>
        <!-- <div id="debug-output" class="mt-3 text-danger small" style="min-height:2em;"></div> -->
      </div>
    </div>
  </div>
  <!-- Bootstrap 5 JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
  <script>
    // Username validation logic
    const usernameInput = document.getElementById('username');
    const usernameForm = document.getElementById('username-form');
    const usernameError = document.getElementById('usernameError');
    const usernameSubmit = document.getElementById('username-submit');

    function validateUsername(value) {
      // At least 5 chars, 1 uppercase, 1 number, 1 special char
      const pattern = /^(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{5,}$/;
      return pattern.test(value);
    }

    usernameForm.addEventListener('submit', function(e) {
      e.preventDefault();
      const value = usernameInput.value;
      if (!validateUsername(value)) {
        usernameError.textContent = 'Invalid username. Must be at least 5 characters, include 1 uppercase letter, 1 number, and 1 special character.';
        usernameError.style.display = 'block';
        usernameInput.classList.add('is-invalid');
      } else {
        usernameError.style.display = 'none';
        usernameInput.classList.remove('is-invalid');
        usernameInput.classList.add('is-valid');
        // You can add logic here to enable the rest of the app or store the username
      }
    });
  </script>
</body>
</html>
